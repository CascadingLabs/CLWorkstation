---
name: molecule

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [default]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install molecule + ansible + docker driver
        # molecule no longer ships a `docker` extra; the driver lives in
        # molecule-plugins. Install both into the same uv tool env so
        # molecule's subprocess calls (ansible-config, etc.) resolve.
        run: |
          uv tool install --force molecule \
            --with 'molecule-plugins[docker]' \
            --with docker \
            --with ansible

      - name: Run molecule
        env:
          # Override the project ansible.cfg's removed community.general.yaml
          # callback. New ansible-core ships its own yaml result format.
          ANSIBLE_STDOUT_CALLBACK: default
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
        run: |
          export PATH="$HOME/.local/share/uv/tools/molecule/bin:$PATH"
          molecule test -s ${{ matrix.scenario }}
