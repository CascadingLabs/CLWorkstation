---
- name: Verify CLWorkstation install
  hosts: all
  become: false
  gather_facts: true

  tasks:
    - name: Binaries exist and are executable
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
      register: _bin
      failed_when: not _bin.stat.exists or not _bin.stat.executable
      loop:
        - rg
        - fd
        - bat
        - eza
        - fzf
        - zoxide
        - starship
        - btop
        - lazygit
        - lazydocker
        - nvim

    - name: bashrc.d fragments installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.bashrc.d/{{ item }}"
      register: _frag
      failed_when: not _frag.stat.exists
      loop:
        - aliases.sh
        - fzf.sh
        - starship.sh

    - name: gs alias resolves via interactive bash
      ansible.builtin.shell: bash -ic 'alias gs'
      register: _alias_gs
      changed_when: false
      failed_when: "'git status -sb' not in _alias_gs.stdout"

    - name: LazyVim starter was cloned
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.config/nvim/init.lua"
      register: _nvim
      failed_when: not _nvim.stat.exists

    - name: Nerd Font .ttf files were installed
      ansible.builtin.find:
        paths: "{{ ansible_env.HOME }}/.local/share/fonts/JetBrainsMono"
        patterns: "*.ttf"
        recurse: true
      register: _font_files
      failed_when: _font_files.matched == 0

    - name: Font sentinel was written
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.cache/clworkstation/font-JetBrainsMono-3.4.0.installed"
      register: _font_sentinel
      failed_when: not _font_sentinel.stat.exists

    - name: fontconfig sees the JetBrainsMono Nerd Font
      ansible.builtin.command: fc-list
      register: _fc_list
      changed_when: false
      failed_when: "'JetBrainsMono Nerd Font' not in _fc_list.stdout"
