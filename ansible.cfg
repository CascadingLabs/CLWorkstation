[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
stdout_callback = default
result_format = yaml
retry_files_enabled = False
interpreter_python = auto_silent
forks = 10

[ssh_connection]
pipelining = True

[all:vars]
ansible_user=<whoami_user>
ansible_ssh_private_key_file=~/.ssh/<your_ssh_key>
