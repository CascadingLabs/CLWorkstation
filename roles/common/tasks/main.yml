---
- name: Ensure per-user directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ user_bin_dir }}"
    - "{{ user_config_dir }}"
    - "{{ user_cache_dir }}"
    - "{{ ansible_env.HOME }}/.bashrc.d"
    - "{{ ansible_env.HOME }}/.local/share"

- name: Ensure ~/.ssh exists with safe permissions
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: "0700"

- name: Ensure ~/.ssh/authorized_keys exists with safe permissions
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
    state: touch
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Authorize my SSH public key for this user
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
    line: "{{ lookup('ansible.builtin.file', 'id_ed25519.pub') | trim }}"
    create: false
    state: present
    mode: "0600"

# Best-effort: if we happen to have sudo, make sure base packages are present.
# If not, skip silently — the tools role downloads static binaries anyway.
- name: Install base packages (only if we have sudo)
  become: true
  ansible.builtin.package:
    name: "{{ base_packages }}"
    state: present
  when: base_packages | length > 0
  register: _base_pkg_result
  failed_when: false

- name: Note if base packages could not be installed
  ansible.builtin.debug:
    msg: >-
      Base packages were not installed (no sudo or package manager issue).
      This is fine — CLWorkstation installs tools as static binaries.
  when: _base_pkg_result is failed
