---
- name: Read Tailnet auth key from control-node environment
  ansible.builtin.set_fact:
    tailscale_auth_key: "{{ lookup('ansible.builtin.env', tailscale_auth_key_env_var) }}"
  no_log: true

- name: Warn when Tailnet auth key is not set
  ansible.builtin.debug:
    msg: >-
      {{ tailscale_auth_key_env_var }} is not set on the control node;
      Tailscale will be installed but not joined to the tailnet.
  when: tailscale_auth_key | length == 0

- name: Check for existing Tailscale command
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: _tailscale_command

- name: Install Tailscale on Debian-family hosts
  become: true
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Ensure Tailscale apt prerequisites are installed
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    - name: Install Tailscale apt signing key
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }}/{{ ansible_facts['distribution_release'] | lower }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"
      register: _tailscale_apt_key

    - name: Configure Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] | lower }} main"
        filename: tailscale
        state: present
      register: _tailscale_apt_repository

    - name: Update apt cache after adding Tailscale repository
      ansible.builtin.apt:
        update_cache: true
      when: not ansible_check_mode

    - name: Install Tailscale package
      ansible.builtin.apt:
        name: tailscale
        state: present
      when: >-
        not (
          ansible_check_mode
          and (
            _tailscale_apt_key is changed
            or _tailscale_apt_repository is changed
          )
        )

- name: Install Tailscale on Arch Linux hosts
  become: true
  community.general.pacman:
    name: tailscale
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Note Tailscale runtime tasks skipped during first-run check mode
  ansible.builtin.debug:
    msg: >-
      This is a check-mode dry run, so Tailscale package-dependent tasks are
      skipped. Re-run without --check to install Tailscale and join this host
      to the tailnet.
  when:
    - ansible_check_mode
    - not _tailscale_command.stat.exists

- name: Ensure tailscaled is enabled and running
  become: true
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true
  when: not (ansible_check_mode and not _tailscale_command.stat.exists)

- name: Check Tailscale backend state
  become: true
  ansible.builtin.command: tailscale status --json
  register: _tailscale_status
  changed_when: false
  failed_when: false
  when: not (ansible_check_mode and not _tailscale_command.stat.exists)

- name: Parse Tailscale status
  ansible.builtin.set_fact:
    tailscale_backend_state: >-
      {{ ((_tailscale_status.stdout | default('{}') | length > 0)
          | ternary((_tailscale_status.stdout | from_json).BackendState | default(''), '')) }}
  when: not (ansible_check_mode and not _tailscale_command.stat.exists)

- name: Build tailscale up command
  ansible.builtin.set_fact:
    tailscale_up_argv: >-
      {{ ['tailscale', 'up', '--reset', '--auth-key=' ~ tailscale_auth_key]
         + (((tailscale_advertise_tags | length) > 0)
            | ternary(['--advertise-tags=' ~ (tailscale_advertise_tags | join(','))], [])) }}
  no_log: true
  when: not (ansible_check_mode and not _tailscale_command.stat.exists)

- name: Join host to tailnet
  become: true
  ansible.builtin.command:
    argv: "{{ tailscale_up_argv }}"
  register: _tailscale_up
  changed_when: _tailscale_up.rc == 0
  failed_when: false
  no_log: true
  when:
    - not (ansible_check_mode and not _tailscale_command.stat.exists)
    - tailscale_auth_key | length > 0
    - tailscale_backend_state != 'Running'

- name: Report Tailscale join failure
  ansible.builtin.fail:
    msg: >-
      tailscale up failed with exit code {{ _tailscale_up.rc }}.
      stdout={{ (_tailscale_up.stdout | default('') | replace(tailscale_auth_key, '<redacted>')) | to_json }}
      stderr={{ (_tailscale_up.stderr | default('') | replace(tailscale_auth_key, '<redacted>')) | to_json }}
  when:
    - _tailscale_up is defined
    - _tailscale_up.rc is defined
    - _tailscale_up.rc != 0
